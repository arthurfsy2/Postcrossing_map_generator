name: 手动更新图片和 md 文件

on:
  workflow_dispatch:

env:
  blog_path: "./src/Arthur/postcrossing"
  blog_repo: "arthurfsy2/arthurfsy2.github.io"
  PUSH_TO_GITHUB: true
  # 从 Secrets 读取敏感信息
  POSTCROSSING_COOKIE: ${{ secrets.POSTCROSSING_COOKIE }}
  GEMINI_APIKEY: ${{ secrets.GEMINI_APIKEY }}
  GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}

jobs:
  sync:
    name: 同步
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: 缓存 UV 环境
        uses: actions/cache@v4
        id: uv-cache
        with:
          path: |
            ~/.cache/uv
            .venv
            ~/.local/share/uv/python
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: 缓存 Postcrossing Cookie 配置
        uses: actions/cache@v4
        id: cookie-cache
        with:
          path: scripts/.cookie_config.toml
          key: ${{ runner.os }}-postcrossing-cookie-${{ secrets.ACCOUNT }}-${{ hashFiles('scripts/login.py') }}
          restore-keys: |
            ${{ runner.os }}-postcrossing-cookie-${{ secrets.ACCOUNT }}-

      - name: 设置 Python
        run: uv python install 3.13

      - name: 安装依赖
        run: |
          if [ -f "pyproject.toml" ]; then
            uv sync --frozen
          elif [ -f "requirements.txt" ]; then
            uv pip install -r requirements.txt
          else
            echo "未找到依赖文件"
          fi

      - name: 显示缓存状态
        run: |
          if [ "${{ steps.uv-cache.outputs.cache-hit }}" == 'true' ]; then
            echo "🎉 UV 缓存命中！依赖安装非常快"
          else
            echo "🔄 未命中缓存，首次安装依赖..."
          fi
          if [ "${{ steps.cookie-cache.outputs.cache-hit }}" == 'true' ]; then
            echo "🍪 Cookie 缓存命中！跳过登录步骤"
          else
            echo "🍪 未命中 Cookie 缓存，需要重新登录..."
          fi

      - name: 检查Cookie状态
        run: |
          uv run python scripts/login.py ${{ secrets.ACCOUNT }} ${{ secrets.PASSWORD }}
      
      - name: 显示 Cookie 缓存状态
        run: |
          if [ -f "scripts/.cookie_config.toml" ]; then
            echo "✅ Cookie 配置文件已生成"
          else
            echo "❌ Cookie 配置文件未生成，检查登录是否成功"
            exit 1
          fi

      - name: 更新 gallery
        run: |
          uv run python scripts/create_gallery.py ${{ secrets.ACCOUNT }} ${{ secrets.NICKNAME }} $GITHUB_REPOSITORY
      
      - name: Gemini 识别已上传的明信片内容
        run: |
          uv run python scripts/ai_tool.py ${{ secrets.ACCOUNT }} ${{ secrets.GEMINI_APIKEY }}
      
      - name: 更新信息汇总
        run: |
          uv run python scripts/create_personal_page.py ${{ secrets.ACCOUNT }} ${{ secrets.NICKNAME }} $GITHUB_REPOSITORY
      
      - name: 删除缓存文件
        run: rm -rf scripts/__pycache__/

      - name: 提交本仓库更改
        id: push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff-index --quiet HEAD || git commit -m '已更新数据'
          git push || echo "nothing to push"

      # 处理博客仓库同步
      - name: Checkout 博客仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.blog_repo }}
          path: blog-repo
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: 复制.md 文件到博客仓库
        run: |
          # 创建目标目录
          mkdir -p "blog-repo/${{ env.blog_path }}"
          # 只复制 gallery 目录下的.md 文件
          cp ./gallery/*.md "blog-repo/${{ env.blog_path }}/"
          echo "Markdown 文件已复制到博客仓库"

      - name: 检查是否有文件变更
        id: check_changes
        run: |
          cd blog-repo
          if git diff --quiet; then
            echo "没有文件变更"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "检测到文件变更"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送到博客仓库
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd blog-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m '自动同步 postcrossing 数据（手动）'
          git push
